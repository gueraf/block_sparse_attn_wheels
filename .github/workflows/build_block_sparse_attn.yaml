name: Build Block-Sparse Attention

on:
  workflow_dispatch:
    inputs:
      cuda_archs:
        description: 'Semicolon-separated CUDA arch list (e.g. "80;86;89;90" or leave empty for auto-detect)'
        required: false
        default: '80;89;90;100;120'
      upload-to-release:
        description: "Upload wheel to a GitHub release"
        required: false
        type: boolean
        default: true

defaults:
  run:
    shell: bash -x -e -u -o pipefail {0}

jobs:
  build:
    runs-on: [self-hosted, "${{ matrix.runner-arch }}"]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner-arch: X64
            python-version: "3.10"
          - runner-arch: ARM64
            python-version: "3.10"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Read uv version
        id: uv-version
        uses: ./.github/actions/read-uv-version

      - name: 📦 Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false
          version: ${{ steps.uv-version.outputs.version }}

      - name: ⚙️ Prepare environment
        run: |
          uv sync --python ${{ matrix.python-version }}

      - name: 🛠️ Build Block-Sparse Attention
        env:
          BLOCK_SPARSE_ATTN_CUDA_ARCHS: ${{ github.event.inputs.cuda_archs }}
          BSA_CLONE_DIR: ${{ github.workspace }}/Block-Sparse-Attention
        run: |
          bash scripts/build_block_sparse_attn.sh

      - name: 🔍 Find wheel
        run: |
          wheels=$(ls ${{ github.workspace }}/Block-Sparse-Attention/dist/block_sparse_attn-*.whl 2>/dev/null)
          if [ -z "$wheels" ]; then
            echo "Failed to find any wheels."
            exit 1
          fi
          echo "Found wheels:"
          echo "$wheels"
          wheel_path=$(echo "$wheels" | head -n1)
          echo "wheel_path=${wheel_path}" >> $GITHUB_ENV

      - name: 📤 Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.runner-arch }}
          path: ${{ env.wheel_path }}

  release:
    needs: build
    if: inputs.upload-to-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels/
          merge-multiple: false

      - name: 🏷️ Create Release and upload wheels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="build_block_sparse_attn-${{ github.sha }}"
          gh release create "${tag}" \
            --repo "${GH_REPO}" \
            --title "Build Block-Sparse Attention Wheels (${{ github.sha }})" \
            --target "${{ github.sha }}" \
            --prerelease \
            wheels/**/*.whl
