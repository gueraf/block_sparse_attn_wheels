name: Build Block-Sparse Attention

on:
  workflow_dispatch:
    inputs:
      cuda_archs:
        description: 'Semicolon-separated CUDA arch list (e.g. "80;86;89;90" or leave empty for auto-detect)'
        required: false
        default: '80;89;90;100;120'
      upload-to-release:
        description: "Upload wheel to a GitHub release"
        required: false
        type: boolean
        default: true

defaults:
  run:
    shell: bash -x -e -u -o pipefail {0}

jobs:
  build-and-release:
    runs-on: [self-hosted, x64]
    permissions:
      contents: write
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Read uv version
        id: uv-version
        uses: ./.github/actions/read-uv-version

      - name: 📦 Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false
          version: ${{ steps.uv-version.outputs.version }}

      - name: ⚙️ Prepare environment
        run: |
          uv sync --python ${{ matrix.python-version }}

      - name: 🛠️ Build Block-Sparse Attention
        env:
          BLOCK_SPARSE_ATTN_CUDA_ARCHS: ${{ github.event.inputs.cuda_archs }}
          BSA_CLONE_DIR: ${{ github.workspace }}/Block-Sparse-Attention
        run: |
          bash scripts/build_block_sparse_attn.sh

      - name: 🔍 Find Wheels
        run: |
          wheels=$(ls ${{ github.workspace }}/Block-Sparse-Attention/dist/block_sparse_attn-*.whl 2>/dev/null)
          if [ -z "$wheels" ]; then
            echo "Failed to find any wheels."
            exit 1
          fi
          echo "Found wheels:"
          echo "$wheels"
          wheel_path=$(echo "$wheels" | head -n1)
          echo "wheel_path=${wheel_path}" >> $GITHUB_ENV
          echo "wheel_name=$(basename ${wheel_path})" >> $GITHUB_ENV

      - name: 🏷️ Create Release
        id: create_release
        if: inputs.upload-to-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build_block_sparse_attn-${{ github.sha }}
          release_name: Build Block-Sparse Attention Wheels (${{ github.sha }})
          commitish: ${{ github.sha }}
          prerelease: true

      - name: 🚀 Upload Release Asset
        if: inputs.upload-to-release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.wheel_path }}
          asset_name: ${{ env.wheel_name }}
          asset_content_type: application/octet-stream
